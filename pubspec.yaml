name: pundi
description: Pundi — pencatat keuangan dan pemindai struk yang sepenuhnya offline.
publish_to: none
version: 1.2.0+3

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  path: ^1.9.1
  path_provider: ^2.1.6
  google_mlkit_text_recognition: ^0.16.0
  image_picker: ^1.2.3
  fl_chart: ^1.2.0
  csv: ^8.0.0
  share_plus: ^12.0.2
  permission_handler: ^12.0.3
  intl: ^0.20.3
  file_picker: ^11.0.2
  local_auth: ^3.0.2
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  sqflite_sqlcipher: ^3.4.0
  flutter_secure_storage: ^10.3.1
  image_cropper: ^12.2.1
  image: ^4.8.0
  cryptography: ^2.9.0
  home_widget: ^0.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/pundi_icon.png
